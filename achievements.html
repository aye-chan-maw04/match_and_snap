<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Match & Snap - Achievements</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Achievements Page - Chic Minimalist */
        .achievements-page {
            background: #faf8f5;
            min-height: 100vh;
        }
        
        .achievements-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 40px 30px;
        }
        
        /* Header */
        .achievements-header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .achievements-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5em;
            font-weight: 600;
            color: #2d2a2a;
            letter-spacing: -0.02em;
            margin-bottom: 15px;
        }
        
        .achievements-header p {
            font-family: 'Inter', sans-serif;
            color: #7a6e6e;
            font-size: 1.1em;
        }
        
        .header-divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #d4b8c8, #c4a0b0);
            margin: 20px auto 0;
        }
        
        /* Progress Overview Card */
        .progress-overview {
            background: white;
            border-radius: 28px;
            padding: 35px;
            margin-bottom: 50px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid #f0e6ea;
        }
        
        .progress-overview h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5em;
            font-weight: 500;
            color: #2d2a2a;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .progress-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 25px;
            margin-bottom: 30px;
        }
        
        .progress-stat {
            background: #faf8f5;
            padding: 25px 20px;
            border-radius: 20px;
            text-align: center;
            transition: all 0.3s ease;
            border: 1px solid #f0e6ea;
        }
        
        .progress-stat:hover {
            transform: translateY(-3px);
            border-color: #e0d6da;
        }
        
        .stat-icon {
            font-size: 2em;
            color: #c4a0b0;
            margin-bottom: 12px;
        }
        
        .stat-value {
            font-size: 2.5em;
            font-weight: 600;
            color: #2d2a2a;
            font-family: 'Playfair Display', serif;
        }
        
        .stat-label {
            color: #a08a94;
            font-size: 0.85em;
            font-family: 'Inter', sans-serif;
            margin-top: 5px;
        }
        
        .overall-progress-container {
            margin-top: 25px;
            padding-top: 20px;
            border-top: 1px solid #f0e6ea;
        }
        
        .progress-label {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 0.85em;
            color: #a08a94;
            font-family: 'Inter', sans-serif;
        }
        
        .progress-bar {
            height: 6px;
            background: #f0e6ea;
            border-radius: 3px;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #c4a0b0, #d4b8c8);
            border-radius: 3px;
            transition: width 0.5s ease;
        }
        
        /* Badges Section */
        .badges-section {
            margin-bottom: 50px;
        }
        
        .badges-section h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.5em;
            font-weight: 500;
            color: #2d2a2a;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .badge-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        
        .badge {
            width: 70px;
            height: 70px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            transition: all 0.3s ease;
            border: 1px solid #f0e6ea;
            cursor: pointer;
            position: relative;
        }
        
        .badge:hover {
            transform: scale(1.05);
            border-color: #c4a0b0;
        }
        
        .badge.unlocked {
            background: linear-gradient(135deg, #c4a0b0, #d4b8c8);
            border: none;
            color: white;
            animation: badgeGlow 2s infinite;
        }
        
        .badge.unlocked:hover {
            transform: scale(1.1);
        }
        
        .badge.locked {
            opacity: 0.5;
            filter: grayscale(0.3);
        }
        
        .badge-tooltip {
            position: absolute;
            bottom: -30px;
            left: 50%;
            transform: translateX(-50%);
            background: #2d2a2a;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.7em;
            font-family: 'Inter', sans-serif;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s ease;
            pointer-events: none;
            z-index: 10;
        }
        
        .badge:hover .badge-tooltip {
            opacity: 1;
        }
        
        @keyframes badgeGlow {
            0%, 100% { box-shadow: 0 0 0 0 rgba(196, 160, 176, 0.4); }
            50% { box-shadow: 0 0 0 10px rgba(196, 160, 176, 0); }
        }
        
        /* Achievements Grid */
        .achievements-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
            margin: 40px 0;
        }
        
        .achievement-card {
            background: white;
            border-radius: 20px;
            padding: 22px;
            display: flex;
            gap: 18px;
            transition: all 0.3s ease;
            border: 1px solid #f0e6ea;
            cursor: pointer;
        }
        
        .achievement-card:hover {
            transform: translateX(5px);
            border-color: #e0d6da;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.05);
        }
        
        .achievement-card.unlocked {
            background: linear-gradient(135deg, #f8f6f4, #faf8f5);
            border-left: 3px solid #c4a0b0;
        }
        
        .achievement-icon {
            font-size: 2.2em;
            min-width: 55px;
            height: 55px;
            background: #faf8f5;
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .achievement-card.unlocked .achievement-icon {
            background: #f0e6ea;
        }
        
        .achievement-info {
            flex: 1;
        }
        
        .achievement-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.1em;
            font-weight: 600;
            color: #2d2a2a;
            margin-bottom: 5px;
        }
        
        .achievement-desc {
            color: #a08a94;
            font-size: 0.8em;
            font-family: 'Inter', sans-serif;
            margin-bottom: 10px;
        }
        
        .achievement-reward {
            display: inline-block;
            background: #f0e6ea;
            color: #c4a0b0;
            padding: 3px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
        }
        
        .achievement-card.unlocked .achievement-reward {
            background: #e8f5e9;
            color: #4caf50;
        }
        
        .achievement-progress {
            margin-top: 12px;
        }
        
        .progress-bar-small {
            height: 4px;
            background: #f0e6ea;
            border-radius: 2px;
            overflow: hidden;
            margin-bottom: 6px;
        }
        
        .progress-fill-small {
            height: 100%;
            background: linear-gradient(90deg, #c4a0b0, #d4b8c8);
            border-radius: 2px;
            transition: width 0.3s ease;
        }
        
        .progress-text {
            font-size: 0.7em;
            color: #a08a94;
            font-family: 'Inter', sans-serif;
        }
        
        .completed-badge {
            color: #4caf50;
            font-size: 0.75em;
            margin-top: 8px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        
        /* Reset Button */
        .reset-btn {
            background: transparent;
            border: 1px solid #e0d6da;
            padding: 12px 28px;
            border-radius: 40px;
            font-family: 'Inter', sans-serif;
            font-weight: 500;
            color: #a08a94;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        
        .reset-btn:hover {
            background: #faf8f5;
            border-color: #c4a0b0;
            color: #c4a0b0;
        }
        
        /* Sound Toggle */
        .sound-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            z-index: 100;
            border: 1px solid #f0e6ea;
        }
        
        .sound-toggle:hover {
            transform: scale(1.1);
            background: #f5f0f2;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .achievements-container {
                padding: 20px;
            }
            
            .achievements-header h1 {
                font-size: 2.5em;
            }
            
            .progress-stats {
                gap: 15px;
            }
            
            .progress-stat {
                padding: 15px;
            }
            
            .stat-value {
                font-size: 1.8em;
            }
            
            .achievements-grid {
                grid-template-columns: 1fr;
            }
            
            .badge {
                width: 55px;
                height: 55px;
                font-size: 1.4em;
            }
        }
        
        @media (max-width: 480px) {
            .progress-stats {
                flex-direction: column;
            }
        }
    </style>
</head>
<body class="achievements-page">
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">
            <span class="logo-text">🌸 Match & Snap</span>
        </div>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
            <a href="game.html" class="nav-link"><i class="fas fa-gamepad"></i> Game</a>
            <a href="photobooth.html" class="nav-link"><i class="fas fa-camera"></i> Photo Booth</a>
            <a href="shop.html" class="nav-link"><i class="fas fa-shopping-bag"></i> Shop</a>
            <a href="gallery.html" class="nav-link"><i class="fas fa-images"></i> Gallery</a>
            <a href="achievements.html" class="nav-link active"><i class="fas fa-trophy"></i> Achievements</a>
            <a href="about.html" class="nav-link"><i class="fas fa-heart"></i> About</a>
        </div>
        
        <div class="user-section">
            <div class="coin-display">
                <i class="fas fa-star"></i>
                <span id="coin-counter">0</span>
            </div>
            <div class="avatar" id="avatar-display">
                👧
            </div>
        </div>
    </nav>

    <!-- Achievements Container -->
    <div class="achievements-container">
        <div class="achievements-header">
            <h1>Milestones</h1>
            <div class="header-divider"></div>
            <p>Every achievement tells your story</p>
        </div>

        <!-- Progress Overview -->
        <div class="progress-overview">
            <h2>
                <i class="fas fa-chart-line" style="color: #c4a0b0;"></i>
                Your Journey
            </h2>
            <div class="progress-stats">
                <div class="progress-stat">
                    <div class="stat-icon"><i class="fas fa-trophy"></i></div>
                    <div class="stat-value" id="achievements-completed">0/10</div>
                    <div class="stat-label">Achievements</div>
                </div>
                <div class="progress-stat">
                    <div class="stat-icon"><i class="fas fa-coins"></i></div>
                    <div class="stat-value" id="total-rewards">0</div>
                    <div class="stat-label">Coins Earned</div>
                </div>
                <div class="progress-stat">
                    <div class="stat-icon"><i class="fas fa-percent"></i></div>
                    <div class="stat-value" id="completion-rate">0%</div>
                    <div class="stat-label">Completion</div>
                </div>
            </div>
            <div class="overall-progress-container">
                <div class="progress-label">
                    <span>Overall Progress</span>
                    <span id="overall-percent">0%</span>
                </div>
                <div class="progress-bar">
                    <div class="progress-fill" id="overall-progress" style="width: 0%;"></div>
                </div>
            </div>
        </div>

        <!-- Badges Collection -->
        <div class="badges-section">
            <h2>
                <i class="fas fa-medal" style="color: #c4a0b0;"></i>
                Badge Collection
            </h2>
            <div class="badge-container" id="badge-container">
                <!-- Will be populated by JavaScript -->
            </div>
        </div>

        <!-- Achievements Grid -->
        <h2 style="font-family: 'Playfair Display', serif; font-size: 1.5em; font-weight: 500; color: #2d2a2a; margin-bottom: 20px;">
            <i class="fas fa-list-check" style="color: #c4a0b0; margin-right: 10px;"></i>
            All Achievements
        </h2>
        <div id="achievements-grid" class="achievements-grid">
            <!-- Will be populated by JavaScript -->
        </div>

        <!-- Reset Button -->
        <div style="text-align: center; margin-top: 40px;">
            <button class="reset-btn" onclick="resetAchievements()">
                <i class="fas fa-undo-alt"></i> Reset Progress
            </button>
        </div>
    </div>

    <!-- Sound Toggle -->
    <div class="sound-toggle" onclick="toggleAchievementSound()" id="achievement-sound-toggle">
        <i class="fas fa-volume-up"></i>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/achievements.js"></script>
</body>
</html>
