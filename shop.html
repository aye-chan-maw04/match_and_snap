<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Match & Snap - Shop</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
        /* Shop Page Specific - Chic Minimalist */
        .shop-page {
            background: #faf8f5;
            min-height: 100vh;
        }
        
        .shop-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 40px 30px;
        }
        
        /* Header */
        .shop-header {
            text-align: center;
            margin-bottom: 50px;
        }
        
        .shop-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 3.5em;
            font-weight: 600;
            color: #2d2a2a;
            letter-spacing: -0.02em;
            margin-bottom: 15px;
        }
        
        .shop-header p {
            font-family: 'Inter', sans-serif;
            color: #7a6e6e;
            font-size: 1.1em;
        }
        
        .header-divider {
            width: 60px;
            height: 3px;
            background: linear-gradient(90deg, #d4b8c8, #c4a0b0);
            margin: 20px auto 0;
        }
        
        /* Coins Card */
        .coins-card {
            background: white;
            border-radius: 28px;
            padding: 25px 35px;
            margin-bottom: 50px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 20px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid #f0e6ea;
        }
        
        .coins-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .coins-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #ffb8d1, #e0c3fc);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8em;
            color: white;
        }
        
        .coins-text h3 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2em;
            color: #2d2a2a;
            margin-bottom: 5px;
        }
        
        .coins-text p {
            color: #a08a94;
            font-size: 0.85em;
        }
        
        .coins-amount {
            background: linear-gradient(135deg, #ffb8d1, #e0c3fc);
            padding: 12px 30px;
            border-radius: 40px;
            color: white;
            font-weight: 600;
            font-size: 1.3em;
            font-family: 'Inter', sans-serif;
        }
        
        /* Category Section */
        .shop-category {
            margin-bottom: 60px;
        }
        
        .category-title {
            display: flex;
            align-items: baseline;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .category-title h2 {
            font-family: 'Playfair Display', serif;
            font-size: 1.8em;
            font-weight: 500;
            color: #2d2a2a;
        }
        
        .category-divider {
            flex: 1;
            height: 1px;
            background: linear-gradient(90deg, #e0d6da, transparent);
        }
        
        /* Shop Grid - Chic Cards */
        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 25px;
        }
        
        .shop-item {
            background: white;
            border-radius: 24px;
            padding: 28px 20px;
            text-align: center;
            transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            border: 1px solid #f0e6ea;
            position: relative;
            overflow: hidden;
        }
        
        .shop-item::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 3px;
            background: linear-gradient(90deg, #ffb8d1, #e0c3fc);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }
        
        .shop-item:hover::before {
            transform: scaleX(1);
        }
        
        .shop-item:hover {
            transform: translateY(-6px);
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.08);
            border-color: #e0d6da;
        }
        
        .shop-item.unlocked {
            background: linear-gradient(135deg, #f5f8f5, #f0f5f0);
            border-color: #c4d4c4;
        }
        
        .shop-item.unlocked::before {
            background: linear-gradient(90deg, #a8e6cf, #8fd3f4);
            transform: scaleX(1);
        }
        
        /* Item Icon */
        .item-icon {
            font-size: 3.5em;
            margin-bottom: 20px;
            display: inline-block;
            transition: transform 0.3s ease;
        }
        
        .shop-item:hover .item-icon {
            transform: scale(1.05);
        }
        
        /* Item Name */
        .item-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.3em;
            font-weight: 600;
            color: #2d2a2a;
            margin-bottom: 8px;
        }
        
        /* Item Description */
        .item-description {
            color: #a08a94;
            font-size: 0.8em;
            font-family: 'Inter', sans-serif;
            margin-bottom: 20px;
            line-height: 1.4;
        }
        
        /* Price */
        .item-price {
            font-size: 1.4em;
            font-weight: 600;
            color: #c4a0b0;
            margin: 15px 0;
            font-family: 'Inter', sans-serif;
        }
        
        .item-price i {
            font-size: 0.9em;
            margin-right: 4px;
        }
        
        /* Owned Badge */
        .owned-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #e8f5e9;
            color: #4caf50;
            padding: 6px 16px;
            border-radius: 30px;
            font-size: 0.8em;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
        }
        
        /* Buy Button */
        .buy-btn {
            background: linear-gradient(135deg, #2d2a2a, #3a3535);
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.9em;
            font-weight: 500;
            font-family: 'Inter', sans-serif;
            transition: all 0.3s ease;
            width: 100%;
            margin-top: 10px;
        }
        
        .buy-btn:hover {
            background: linear-gradient(135deg, #c4a0b0, #d4b8c8);
            transform: translateY(-2px);
        }
        
        .buy-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        /* Sound Toggle */
        .sound-toggle {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 50px;
            height: 50px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            transition: all 0.3s ease;
            z-index: 100;
            border: 1px solid #f0e6ea;
        }
        
        .sound-toggle:hover {
            transform: scale(1.1);
            background: #f5f0f2;
        }
        
        /* Empty State */
        .empty-shop {
            text-align: center;
            padding: 40px;
            color: #a08a94;
            font-family: 'Inter', sans-serif;
        }
        
        /* Responsive */
        @media (max-width: 768px) {
            .shop-container {
                padding: 20px;
            }
            
            .shop-header h1 {
                font-size: 2.5em;
            }
            
            .coins-card {
                flex-direction: column;
                text-align: center;
            }
            
            .category-title h2 {
                font-size: 1.5em;
            }
            
            .shop-grid {
                grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
                gap: 15px;
            }
        }
        
        @media (max-width: 480px) {
            .shop-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body class="shop-page">
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">
            <span class="logo-text">🌸 Match & Snap</span>
        </div>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
            <a href="game.html" class="nav-link"><i class="fas fa-gamepad"></i> Game</a>
            <a href="photobooth.html" class="nav-link"><i class="fas fa-camera"></i> Photo Booth</a>
            <a href="shop.html" class="nav-link active"><i class="fas fa-shopping-bag"></i> Shop</a>
            <a href="gallery.html" class="nav-link"><i class="fas fa-images"></i> Gallery</a>
            <a href="achievements.html" class="nav-link"><i class="fas fa-trophy"></i> Achievements</a>
            <a href="about.html" class="nav-link"><i class="fas fa-heart"></i> About</a>
        </div>
        
        <div class="user-section">
            <div class="coin-display">
                <i class="fas fa-star"></i>
                <span id="coin-counter">0</span>
            </div>
            <div class="avatar" id="avatar-display">
                👧
            </div>
        </div>
    </nav>

    <!-- Shop Container -->
    <div class="shop-container">
        <div class="shop-header">
            <h1>The Collection</h1>
            <div class="header-divider"></div>
            <p>Curated accessories for your photo moments</p>
        </div>
        
        <!-- Coins Card -->
        <div class="coins-card">
            <div class="coins-info">
                <div class="coins-icon">
                    <i class="fas fa-star"></i>
                </div>
                <div class="coins-text">
                    <h3>Your Balance</h3>
                    <p>Earn more by playing the Memory Game</p>
                </div>
            </div>
            <div class="coins-amount">
                <span id="shop-coins">0</span> coins
            </div>
        </div>

        <!-- Filters Category -->
        <div class="shop-category">
            <div class="category-title">
                <h2>🎨 Filters</h2>
                <div class="category-divider"></div>
            </div>
            <div id="filters-grid" class="shop-grid"></div>
        </div>

        <!-- Frames Category -->
        <div class="shop-category">
            <div class="category-title">
                <h2>🖼️ Frames</h2>
                <div class="category-divider"></div>
            </div>
            <div id="frames-grid" class="shop-grid"></div>
        </div>

        <!-- Avatars Category -->
        <div class="shop-category">
            <div class="category-title">
                <h2>👧 Avatars</h2>
                <div class="category-divider"></div>
            </div>
            <div id="avatars-grid" class="shop-grid"></div>
        </div>

        <!-- Stickers Category -->
        <div class="shop-category">
            <div class="category-title">
                <h2>✨ Stickers</h2>
                <div class="category-divider"></div>
            </div>
            <div id="stickers-grid" class="shop-grid"></div>
        </div>
    </div>

    <!-- Sound Toggle -->
    <div class="sound-toggle" onclick="toggleShopSound()" id="shop-sound-toggle">
        <i class="fas fa-volume-up"></i>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/shop.js"></script>
</body>
</html>
