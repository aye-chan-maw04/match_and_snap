<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Match & Snap - Gallery</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Playfair+Display:wght@400;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
    
    <style>
    /* Gallery Page Specific Styles - Chic Design */
    .gallery-page {
        background: #faf8f5;
        min-height: 100vh;
    }
    
    .gallery-container {
        max-width: 1400px;
        margin: 0 auto;
        padding: 40px 30px;
    }
    
    /* Header Section */
    .gallery-header {
        text-align: center;
        margin-bottom: 50px;
    }
    
    .gallery-header h1 {
        font-family: 'Playfair Display', serif;
        font-size: 3em;
        font-weight: 600;
        color: #2d2a2a;
        letter-spacing: -0.02em;
        margin-bottom: 15px;
    }
    
    .gallery-header p {
        font-family: 'Inter', sans-serif;
        color: #7a6e6e;
        font-size: 1em;
    }
    
    .header-divider {
        width: 60px;
        height: 3px;
        background: linear-gradient(90deg, #d4b8c8, #c4a0b0);
        margin: 20px auto 0;
    }
    
    /* Stats Cards - Smaller */
    .gallery-stats {
        display: flex;
        justify-content: center;
        gap: 25px;
        margin: 40px 0;
        flex-wrap: wrap;
    }
    
    .stat-card {
        background: white;
        padding: 18px 30px;
        border-radius: 20px;
        text-align: center;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.03);
        border: 1px solid #f0e6ea;
        transition: all 0.3s ease;
        min-width: 130px;
    }
    
    .stat-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
    }
    
    .stat-icon {
        font-size: 1.5em;
        color: #c4a0b0;
        margin-bottom: 8px;
    }
    
    .stat-number {
        font-size: 1.8em;
        font-weight: 600;
        color: #2d2a2a;
        font-family: 'Playfair Display', serif;
    }
    
    .stat-label {
        color: #a08a94;
        font-size: 0.8em;
        letter-spacing: 0.5px;
        margin-top: 5px;
    }
    
    /* Gallery Grid - Smaller Photos */
    .gallery-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
        gap: 25px;
        margin: 40px 0;
    }
    
    .gallery-item {
        background: white;
        border-radius: 20px;
        overflow: hidden;
        transition: all 0.4s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        cursor: pointer;
        box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
        border: 1px solid #f0e6ea;
    }
    
    .gallery-item:hover {
        transform: translateY(-5px);
        box-shadow: 0 15px 30px rgba(0, 0, 0, 0.1);
    }
    
    .gallery-image-container {
        position: relative;
        background: #f5f0f2;
        height: 280px;
        display: flex;
        align-items: center;
        justify-content: center;
        overflow: hidden;
    }
    
    .gallery-item img {
        width: 100%;
        height: 100%;
        object-fit: cover;
        display: block;
        transition: transform 0.5s ease;
    }
    
    .gallery-item:hover img {
        transform: scale(1.03);
    }
    
    /* Overlay on hover */
    .photo-overlay {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background: rgba(45, 42, 42, 0.6);
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 15px;
        opacity: 0;
        transition: opacity 0.3s ease;
        backdrop-filter: blur(4px);
    }
    
    .gallery-item:hover .photo-overlay {
        opacity: 1;
    }
    
    .photo-action-btn {
        width: 38px;
        height: 38px;
        border-radius: 50%;
        background: white;
        border: none;
        cursor: pointer;
        font-size: 1em;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #2d2a2a;
    }
    
    .photo-action-btn:hover {
        background: #c4a0b0;
        color: white;
        transform: scale(1.1);
    }
    
    /* Photo Info - Compact */
    .gallery-item-info {
        padding: 12px 15px;
        background: white;
    }
    
    .photo-date {
        color: #a08a94;
        font-size: 0.7em;
        margin-bottom: 6px;
        font-family: 'Inter', sans-serif;
    }
    
    .photo-tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 5px;
    }
    
    .photo-tag {
        background: #f5f0f2;
        padding: 3px 10px;
        border-radius: 30px;
        font-size: 0.65em;
        color: #8a6e7a;
        font-family: 'Inter', sans-serif;
        letter-spacing: 0.3px;
    }
    
    .photo-coins {
        position: absolute;
        top: 10px;
        right: 10px;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(4px);
        padding: 4px 12px;
        border-radius: 30px;
        font-size: 0.7em;
        font-weight: 500;
        color: #c4a0b0;
        font-family: 'Inter', sans-serif;
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.05);
        z-index: 2;
    }
    
    .new-badge {
        position: absolute;
        top: 10px;
        left: 10px;
        background: #c4a0b0;
        color: white;
        padding: 3px 10px;
        border-radius: 30px;
        font-size: 0.65em;
        font-weight: 500;
        letter-spacing: 0.5px;
        z-index: 2;
    }
    
    /* Empty Gallery */
    .empty-gallery {
        text-align: center;
        padding: 60px 40px;
        background: white;
        border-radius: 30px;
        border: 1px solid #f0e6ea;
    }
    
    .empty-icon {
        font-size: 4em;
        margin-bottom: 20px;
        opacity: 0.6;
    }
    
    .empty-gallery h3 {
        font-family: 'Playfair Display', serif;
        font-size: 1.5em;
        color: #2d2a2a;
        margin-bottom: 12px;
    }
    
    /* Controls - Compact */
    .gallery-controls {
        display: flex;
        gap: 15px;
        justify-content: center;
        margin-top: 30px;
    }
    
    .control-btn {
        padding: 10px 28px;
        border: 1px solid #e0d6da;
        background: white;
        border-radius: 40px;
        font-family: 'Inter', sans-serif;
        font-weight: 500;
        font-size: 0.9em;
        cursor: pointer;
        transition: all 0.3s ease;
        display: flex;
        align-items: center;
        gap: 8px;
    }
    
    .control-btn:hover {
        background: #2d2a2a;
        color: white;
        border-color: #2d2a2a;
    }
    
    /* Modal - Minimalist */
    .modal {
        display: none;
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background: rgba(0, 0, 0, 0.85);
        z-index: 3000;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(8px);
    }
    
    .modal.active {
        display: flex;
    }
    
    .modal-content {
        background: white;
        padding: 25px;
        border-radius: 28px;
        max-width: 85vw;
        max-height: 85vh;
        overflow: auto;
        position: relative;
        animation: modalFade 0.3s ease;
    }
    
    @keyframes modalFade {
        from {
            opacity: 0;
            transform: scale(0.95);
        }
        to {
            opacity: 1;
            transform: scale(1);
        }
    }
    
    .modal-close {
        position: absolute;
        top: 15px;
        right: 15px;
        font-size: 1.3em;
        cursor: pointer;
        color: #a08a94;
        transition: all 0.2s ease;
        width: 35px;
        height: 35px;
        display: flex;
        align-items: center;
        justify-content: center;
        border-radius: 50%;
        background: #f5f0f2;
    }
    
    .modal-close:hover {
        background: #2d2a2a;
        color: white;
    }
    
    .modal-content img {
        max-width: 100%;
        max-height: 55vh;
        border-radius: 16px;
        display: block;
        margin: 0 auto;
    }
    
    .modal-info {
        text-align: center;
        margin-top: 20px;
        padding-top: 15px;
        border-top: 1px solid #f0e6ea;
    }
    
    .modal-info h3 {
        font-family: 'Playfair Display', serif;
        font-size: 1.2em;
        color: #2d2a2a;
        margin-bottom: 8px;
    }
    
    .modal-info p {
        color: #7a6e6e;
        font-family: 'Inter', sans-serif;
        font-size: 0.85em;
        margin: 4px 0;
    }
    
    .modal-buttons {
        display: flex;
        gap: 12px;
        justify-content: center;
        margin-top: 20px;
    }
    
    /* Loading State */
    .loading-state {
        text-align: center;
        padding: 50px;
    }
    
    .loading-spinner {
        width: 40px;
        height: 40px;
        border: 2px solid #f0e6ea;
        border-top: 2px solid #c4a0b0;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 15px;
    }
    
    @keyframes spin {
        to { transform: rotate(360deg); }
    }
    
    /* Responsive */
    @media (max-width: 1024px) {
        .gallery-grid {
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 20px;
        }
        
        .gallery-image-container {
            height: 260px;
        }
    }
    
    @media (max-width: 768px) {
        .gallery-container {
            padding: 20px;
        }
        
        .gallery-header h1 {
            font-size: 2.2em;
        }
        
        .gallery-stats {
            gap: 15px;
        }
        
        .stat-card {
            padding: 12px 20px;
            min-width: 100px;
        }
        
        .stat-number {
            font-size: 1.4em;
        }
        
        .gallery-grid {
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        
        .gallery-image-container {
            height: 220px;
        }
        
        .modal-content {
            padding: 20px;
            width: 95%;
        }
        
        .modal-buttons {
            flex-direction: column;
            gap: 10px;
        }
        
        .modal-buttons button {
            width: 100%;
        }
    }
    
    @media (max-width: 480px) {
        .gallery-grid {
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 12px;
        }
        
        .gallery-image-container {
            height: 180px;
        }
        
        .gallery-item-info {
            padding: 8px 10px;
        }
        
        .photo-tag {
            font-size: 0.6em;
            padding: 2px 8px;
        }
        
        .stat-card {
            padding: 10px 15px;
            min-width: 85px;
        }
        
        .stat-number {
            font-size: 1.2em;
        }
        
        .stat-label {
            font-size: 0.7em;
        }
        
        .control-btn {
            padding: 8px 20px;
            font-size: 0.85em;
        }
    }
</style>
</head>
<body class="gallery-page">
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">
            <span class="logo-text">🌸 Match & Snap</span>
        </div>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
            <a href="game.html" class="nav-link"><i class="fas fa-gamepad"></i> Game</a>
            <a href="photobooth.html" class="nav-link"><i class="fas fa-camera"></i> Photo Booth</a>
            <a href="shop.html" class="nav-link"><i class="fas fa-shopping-bag"></i> Shop</a>
            <a href="gallery.html" class="nav-link active"><i class="fas fa-images"></i> Gallery</a>
            <a href="achievements.html" class="nav-link"><i class="fas fa-trophy"></i> Achievements</a>
            <a href="about.html" class="nav-link"><i class="fas fa-heart"></i> About</a>
        </div>
        
        <div class="user-section">
            <div class="coin-display">
                <i class="fas fa-star"></i>
                <span id="coin-counter">0</span>
            </div>
            <div class="avatar" id="avatar-display">
                👧
            </div>
        </div>
    </nav>

    <!-- Gallery Container -->
    <div class="gallery-container">
        <div class="gallery-header">
            <h1>Photo Gallery</h1>
            <div class="header-divider"></div>
            <p>Your timeless memories, beautifully preserved</p>
        </div>

        <!-- Gallery Stats -->
        <div class="gallery-stats" id="gallery-stats">
            <div class="stat-card">
                <div class="stat-icon">📸</div>
                <div class="stat-number" id="total-photos">0</div>
                <div class="stat-label">Total Photos</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🪙</div>
                <div class="stat-number" id="total-coins-earned">0</div>
                <div class="stat-label">Coins Earned</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">🎨</div>
                <div class="stat-number" id="favorite-filter">-</div>
                <div class="stat-label">Favorite Filter</div>
            </div>
            <div class="stat-card">
                <div class="stat-icon">📅</div>
                <div class="stat-number" id="latest-photo">-</div>
                <div class="stat-label">Latest</div>
            </div>
        </div>

        <!-- Gallery Grid -->
        <div id="gallery-grid" class="gallery-grid">
            <div class="loading-state">
                <div class="loading-spinner"></div>
                <p>Loading your memories...</p>
            </div>
        </div>

        <!-- Gallery Controls -->
        <div class="gallery-controls">
            <button class="control-btn" onclick="refreshGallery()">
                <i class="fas fa-sync-alt"></i> Refresh
            </button>
            <button class="control-btn" onclick="clearGallery()">
                <i class="fas fa-trash-alt"></i> Clear All
            </button>
        </div>
    </div>

    <!-- Modal -->
    <div class="modal" id="photo-modal">
        <div class="modal-content">
            <div class="modal-close" onclick="closeModal()">&times;</div>
            <img id="modal-image" src="" alt="Photo strip">
            <div class="modal-info">
                <h3 id="modal-title">Photo Strip</h3>
                <p id="modal-date"></p>
                <p id="modal-details"></p>
            </div>
            <div class="modal-buttons">
                <button class="btn btn-primary" onclick="downloadCurrentPhoto()">
                    <i class="fas fa-download"></i> Download
                </button>
                <button class="btn btn-secondary" onclick="deleteCurrentPhoto()">
                    <i class="fas fa-trash"></i> Delete
                </button>
            </div>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="js/main.js"></script>
    <script src="js/gallery.js"></script>
</body>
</html>
