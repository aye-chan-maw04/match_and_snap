<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌸 Match & Snap - Memory Game</title>
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <!-- Main CSS -->
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="logo">
            <span class="logo-text">🌸 Match & Snap</span>
        </div>
        
        <div class="nav-links">
            <a href="index.html" class="nav-link"><i class="fas fa-home"></i> Home</a>
            <a href="game.html" class="nav-link active"><i class="fas fa-gamepad"></i> Game</a>
            <a href="photobooth.html" class="nav-link"><i class="fas fa-camera"></i> Photo Booth</a>
            <a href="shop.html" class="nav-link"><i class="fas fa-shopping-bag"></i> Shop</a>
            <a href="gallery.html" class="nav-link"><i class="fas fa-images"></i> Gallery</a>
            <a href="achievements.html" class="nav-link"><i class="fas fa-trophy"></i> Achievements</a>
            <a href="about.html" class="nav-link"><i class="fas fa-heart"></i> About</a>
        </div>
        
        <div class="user-section">
            <div class="coin-display">
                <i class="fas fa-star"></i>
                <span id="coin-counter">0</span>
            </div>
            <div class="avatar" id="avatar-display">
                👧
            </div>
        </div>
    </nav>

    <!-- Game Container -->
    <div class="game-container">
        <div class="game-header">
            <h1 class="section-title">🎮 Memory Game</h1>
            <p>Match the cute Hirono characters!</p>
        </div>

        <!-- Game Stats -->
        <div class="game-stats">
            <div class="stat-box">
                <i class="fas fa-arrows-alt"></i>
                <span id="moves">0</span> moves
            </div>
            <div class="stat-box">
                <i class="fas fa-heart"></i>
                <span id="matches">0</span> matches
            </div>
            <div class="stat-box">
                <i class="fas fa-star"></i>
                <span id="game-coins">0</span> coins
            </div>
        </div>

        <!-- Character Set Selector -->
        <div style="text-align: center; margin: 20px 0;">
            <h3 style="margin-bottom: 15px;">Choose Your Hirono Set:</h3>
            <div style="display: flex; gap: 10px; justify-content: center; flex-wrap: wrap;">
                <button class="btn btn-secondary set-btn active" onclick="setCharacterSet('set1')">Set 1 🎀</button>
                <button class="btn btn-secondary set-btn" onclick="setCharacterSet('set2')">Set 2 🌸</button>
                <button class="btn btn-secondary set-btn" onclick="setCharacterSet('set3')">Set 3 ✨</button>
                <button class="btn btn-secondary set-btn" onclick="setCharacterSet('set4')">Set 4 💖</button>
            </div>
        </div>

        <!-- Difficulty Selector -->
        <div style="text-align: center; margin: 20px 0;">
            <h3 style="margin-bottom: 15px;">Difficulty:</h3>
            <div style="display: flex; gap: 10px; justify-content: center;">
                <button class="btn btn-secondary difficulty-btn active" onclick="setDifficulty('easy')">Easy (4x4)</button>
                <button class="btn btn-secondary difficulty-btn" onclick="setDifficulty('medium')">Medium (4x6)</button>
                <button class="btn btn-secondary difficulty-btn" onclick="setDifficulty('hard')">Hard (6x6)</button>
            </div>
        </div>

        <!-- Card Size Control -->
        <div style="text-align: center; margin: 20px 0;">
            <label>Card Size: <span id="size-value">100px</span></label>
            <input type="range" min="60" max="120" value="100" id="card-size-slider" oninput="adjustCardSize(this.value)">
        </div>

        <!-- Game Board -->
        <div id="game-board" class="game-board easy"></div>

        <!-- Game Controls -->
        <div style="text-align: center; margin: 20px 0;">
            <button class="btn btn-primary" onclick="resetGame()">
                <i class="fas fa-redo-alt"></i> New Game
            </button>
        </div>
    </div>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <!-- Scripts -->
    <script src="js/main.js"></script>
    <script src="js/game.js"></script>
</body>
</html>
